name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy, scoped to API + parsing + observability + eval)
        run: mypy finplan/api finplan/observability.py finplan/eval finplan/parsing.py

      - name: Test (pytest, offline)
        # RUN_LIVE_AGENT_TEST is unset, so the live LLM test is skipped — the
        # suite is fully deterministic and needs no API keys/secrets.
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t finplan:ci .
